numbered_command = false

use_trash = true
watch_files = true
xdg_open = true
xdg_open_fork = false


[display]
# default, hsplit
mode = "default"

automatically_count_files = true
collapse_preview = true
# ratios for parent view (optional), current view and preview
column_ratio = [1, 4, 4]
scroll_offset = 6
show_borders = true
show_hidden = false
show_icons = true
tilde_in_titlebar = true
# none, absolute, relative
line_number_style = "none"

[display.sort]
# lexical, mtime, natural, size, ext
sort_method = "natural"
case_sensitive = false
directories_first = true
reverse = false

[preview]
# max_preview_size = 2097152                           # 2MB
max_preview_size = 31457280                          # 30MB
preview_script = "~/.config/joshuto/preview_file.sh" # make sure it's marked as executable
preview_shown_hook_script = "~/.config/joshuto/on_preview_shown"
preview_removed_hook_script = "~/.config/joshuto/on_preview_removed"
git_status = "~/.config/joshuto/show_git_status.sh"

[tab]
# inherit, home, root
home_page = "home"
